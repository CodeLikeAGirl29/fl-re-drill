name: Optimize Project Images

# Trigger on a pull request so the script can analyze image differences
on:
  pull_request:
    branches:
      - main
    paths:
      - 'images/**' # Only run when files inside the images folder change

permissions:
  contents: write
  pull-requests: write

jobs:
  crush:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Crush Images
        uses: crush-pics/crush-pics-github-action@v1.0
        # Bypass the broken schema validation by passing values as environment variables
        env:
          INPUT_REPO-TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_API-KEY: ${{ secrets.CRUSH_API_KEY }}
