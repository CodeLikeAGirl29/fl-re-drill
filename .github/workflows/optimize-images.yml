name: Optimize Project Images

# 1. Trigger the workflow when a Pull Request is opened or updated
on:
  pull_request:
    branches:
      - main
    # Only trigger if files in the images folder change
    paths:
      - 'images/**.jpg'
      - 'images/**.jpeg'
      - 'images/**.png'
      - 'images/**.gif'

permissions:
  contents: write
  pull-requests: write

jobs:
  crush:
    runs-on: ubuntu-latest

    steps:
      # 2. Checkout the repository code
      - name: Checkout Repo Code
        uses: actions/checkout@v4

      # 3. Run the Crush Pics optimization with correct, expected parameters
      - name: Crush images
        uses: crush-pics/crush-pics-github-action@v1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          api-key: ${{ secrets.CRUSH_API_KEY }}
