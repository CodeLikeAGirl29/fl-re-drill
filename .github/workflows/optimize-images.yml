name: Optimize Project Images

on:
  push:
    branches:
      - main

# Give the workflow permission to write changes back to the repository
permissions:
  contents: write

jobs:
  shrink-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo Code
        uses: actions/checkout@v4

      - name: Image Optimizer
        uses: crush-pics/crush-pics-github-action@v1.0
        with:
          # The exact input name required by this action
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Optimized Images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: optimize images via CrushPics [skip ci]"
